version: '3.8'

services:
  db:
    image: postgres:15
    container_name: saleselite_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saleselite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: saleselite_redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saleselite_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/saleselite
      - REDIS_URL=redis://redis:6379/0
      # Optional external API keys:
      # - OPENAI_API_KEY=your_key
      # - SUPABASE_JWT_SECRET=your_secret
      # - RAZORPAY_KEY_ID=your_key
      # - RAZORPAY_KEY_SECRET=your_secret
    depends_on:
      - db
      - redis
    restart: always

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saleselite_worker
    command: ["celery", "-A", "app.ai.celery_app", "worker", "-l", "info"]
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/saleselite
      - REDIS_URL=redis://redis:6379/0
      # Optional external API keys:
      # - OPENAI_API_KEY=your_key
    depends_on:
      - db
      - redis
      - backend
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saleselite_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
